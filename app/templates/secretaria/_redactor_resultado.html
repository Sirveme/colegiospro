{% if ref_aviso %}
<div class="sp-alert sp-alert-error" style="margin-bottom:.75rem;">
  ⚠ {{ ref_aviso }}
</div>
{% elif ref_usado %}
<div class="sp-alert sp-alert-ok" style="margin-bottom:.75rem;">
  ✓ Documento de referencia procesado por la IA.
</div>
{% endif %}

<article class="sp-doc sp-doc--{{ tono or 'formal' }}" data-doc-id="{{ documento_id }}" data-tono="{{ tono or 'formal' }}">
  <pre class="sp-doc-texto" id="sp-doc-texto-{{ documento_id }}">{{ texto_salida }}</pre>
</article>
<div class="sp-acciones">
  <a class="sp-btn" href="/secretaria/documento/{{ documento_id }}/pdf" target="_blank" rel="noopener">
    📄 Descargar PDF
  </a>
  <button class="sp-btn" type="button" onclick="spImprimir({{ documento_id }})">
    🖨 Imprimir
  </button>
  <button class="sp-btn" type="button" onclick="spCopiar({{ documento_id }})">
    📋 Copiar texto
  </button>
  <button
    class="sp-btn sp-btn-primary"
    type="button"
    hx-post="/secretaria/documento/{{ documento_id }}/guardar"
    hx-swap="none"
    onclick="this.textContent='✓ Guardado'"
  >💾 Guardar en historial</button>
</div>
<script>spStopSpinner();</script>
